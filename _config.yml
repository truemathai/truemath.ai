# TrueMath marketing site — Jekyll config
title: TrueMath
url: https://truemath.ai

# Used by the analytics snippet in the shared layout.
google_analytics: G-J6QKEF8PLS

# Default social-share image (pages can override with `og_image` front matter).
og_image: /images/logos/truemath-logo-long-color.png

# No Jekyll theme — the site ships its own complete stylesheet at css/site.css.
# GitHub Pages otherwise defaults to jekyll-theme-primer, which we don't use.
theme: null

# Vertical landing pages. Each file in _verticals/ is one industry vertical and
# becomes a page at /for/<filename>/. To add a vertical, copy an existing file
# in _verticals/, rename it, and edit its content — no HTML or CSS to touch.
collections:
  verticals:
    output: true
    permalink: /for/:name/
  # Campaign redirect links. Each file in _go/ is one assigned tracking code and
  # becomes a redirect at /go/<CODE>/ that forwards to `to:` with UTM params
  # attached. See the "Campaign redirect links" section of README.md.
  go:
    output: true
    permalink: /go/:name/

# Every _go/ file is a redirect: give them the redirect layout by default (so a
# code file only needs its data) and keep them out of the sitemap.
defaults:
  - scope:
      path: ""
      type: go
    values:
      layout: redirect
      sitemap: false

# Keep Jekyll from touching things it shouldn't, and copy static files through.
exclude:
  - README.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
keep_files:
  - CNAME
